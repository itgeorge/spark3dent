<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spark3Dent IAM</title>
  <link rel="icon" href="/images/logo.png" />
  <link rel="stylesheet" href="/css/app-chrome.css" />
  <style>
    :root{--a2:#7c3aed;--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--shadow:0 8px 30px rgba(15,23,42,.08);--radius:16px;--ok:#10b981;--bad:#ef4444;--lab-bg:#f5f3ff;--lab-border:#c4b5fd}
    *{box-sizing:border-box}body{margin:0;font-family:ui-sans-serif,system-ui,sans-serif;color:var(--text);background:var(--bg)}header{border-bottom:1px solid var(--border);background:rgba(248,250,252,.88);backdrop-filter:blur(10px);position:sticky;top:0;z-index:2}.wrap{margin:0 auto;padding-block:22px}.grid{display:grid;grid-template-columns:320px 1fr;gap:18px}.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}.body{padding:18px}.sub{font-size:12px;color:var(--muted)}.list{display:flex;flex-direction:column;gap:10px}.org-btn{width:100%;text-align:left;border:1px solid var(--border);border-radius:12px;background:white;padding:12px;cursor:pointer}.org-btn.lab{background:var(--lab-bg);border-color:var(--lab-border)}.org-btn.active{border-color:var(--a2);box-shadow:0 0 0 4px rgba(124,58,237,.12)}.org-btn .meta{display:block;font-size:12px;color:var(--muted);margin-top:4px}.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.kv div{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff}.label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:4px}.chip{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:700}.chip.active{background:#dcfce7;color:#166534}.chip.inactive{background:#fee2e2;color:#991b1b}.swatch{display:inline-flex;align-items:center;gap:8px}.swatch i{display:inline-block;width:18px;height:18px;border-radius:999px;border:1px solid var(--border)}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left;font-size:13px}th{font-size:11px;text-transform:uppercase;color:var(--muted)}.hidden{display:none!important}body.auth-locked header{display:none}.auth-shell{min-height:100vh;display:grid;place-items:center;padding:24px}.auth-card{width:min(100%,520px);background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.auth-card-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}.auth-card-head img{width:38px;height:38px;border-radius:10px;object-fit:contain}.auth-card-body{padding:20px}.auth-card-body label{display:block;margin:12px 0 6px;font-size:12px;font-weight:800;color:var(--muted)}.auth-card-body input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;font:inherit}.btn{border:1px solid var(--border);border-radius:12px;background:white;padding:10px 13px;font-weight:750;cursor:pointer}.btn.primary{background:linear-gradient(180deg,#7c3aed,#6d28d9);color:white;border-color:#7c3aed}.btn.danger{border-color:#fecaca;color:#991b1b}.btn.small{padding:6px 9px;border-radius:9px;font-size:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.msg{margin-top:12px;padding:10px 12px;border-radius:12px;font-size:13px}.msg.err{background:#fff1f2;border:1px solid #fecaca;color:#991b1b}.msg.ok{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.empty{color:var(--muted)}.modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(15,23,42,.34);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}.add-member-card{width:min(100%,430px)}.add-member-actions{display:flex;justify-content:flex-end;gap:10px;padding:0 18px 18px;flex-wrap:wrap}.add-member-card label{display:block;margin:12px 0 6px;font-size:12px;font-weight:800;color:var(--muted)}.add-member-card label:first-of-type{margin-top:0}.add-member-card input,.add-member-card select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;font:inherit;background:#fff}.secret-input-row{display:flex;align-items:stretch;gap:8px}.secret-input-row input{flex:1;min-width:0}.btn.circle-icon{width:38px;height:38px;min-width:38px;padding:0;border-radius:999px;line-height:1;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}.btn.circle-icon:hover:not(:disabled){border-color:rgba(124,58,237,.45);color:#7c3aed}.copy-icon{display:block;width:18px;height:18px;flex:0 0 auto}.copy-feedback-pop{position:fixed;z-index:60;padding:6px 10px;border-radius:8px;background:#0f172a;color:#fff;font-size:12px;font-weight:650;line-height:1.2;box-shadow:0 8px 24px rgba(15,23,42,.22);pointer-events:none;opacity:1;transition:opacity .3s ease;white-space:nowrap}.copy-feedback-pop.fade-out{opacity:0}.add-member-card input[readonly]{background:#f8fafc;color:var(--muted);cursor:default}.add-member-card .msg{margin:12px 0 0}.confirm-popup-card{width:min(100%,420px)}.confirm-popup-text{margin:0;font-size:15px;line-height:1.5;color:var(--muted)}.confirm-popup-name{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:900;letter-spacing:.04em;color:var(--text)}.confirm-popup-actions{display:flex;justify-content:flex-end;gap:10px;padding:0 18px 18px;flex-wrap:wrap}.color-field{display:flex;flex-direction:column}.color-input-wrap{position:relative}.color-input-wrap input{padding-right:48px}.color-input-preview{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:999px;border:1px solid var(--border);padding:0;cursor:pointer;background:#fff;display:inline-flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.35)}.color-input-preview:hover:not(:disabled){border-color:rgba(124,58,237,.45)}.color-input-preview:disabled{opacity:.55;cursor:not-allowed}.color-input-preview-mark{font-size:14px;font-weight:800;color:var(--muted);line-height:1}.color-input-preview.has-color .color-input-preview-mark{display:none}.color-palette-pop{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:3;padding:10px;border:1px solid var(--border);border-radius:12px;background:#fff;box-shadow:var(--shadow)}.color-palette{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:8px}.color-palette-btn{width:100%;aspect-ratio:1;border-radius:999px;border:2px solid transparent;padding:0;cursor:pointer;background:var(--swatch-color);box-shadow:inset 0 0 0 1px rgba(15,23,42,.08);transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease}.color-palette-btn:hover:not(:disabled){transform:scale(1.06)}.color-palette-btn.active{border-color:#0f172a;box-shadow:0 0 0 3px rgba(124,58,237,.18),inset 0 0 0 1px rgba(15,23,42,.08)}.color-palette-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}.org-picker-wrap{display:none;margin-bottom:12px}.org-picker-wrap label{display:block;margin:0 0 6px;font-size:12px;font-weight:800;color:var(--muted)}.org-picker-wrap select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;font:inherit;background:#fff}@media(max-width:900px){.grid{grid-template-columns:1fr}.org-list-desktop{display:none!important}.org-picker-wrap{display:block}}
  </style>
</head>
<body>
<header><div id="appChromeMount"></div></header>
<main class="wrap app-page hidden" id="appRoot">
  <div class="grid">
    <section class="card">
      <div class="head"><div><b>Organizations</b><div class="sub">Lab IAM</div></div><button class="btn primary" id="newClinicBtn" type="button">New clinic</button></div>
      <div class="body">
        <div class="toolbar" style="margin-bottom:12px">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)"><input id="includeInactive" type="checkbox"> Show inactive</label>
          <button class="btn" id="reloadBtn" type="button">Refresh</button>
        </div>
        <div id="orgPickerWrap" class="org-picker-wrap">
          <label for="orgPicker">Organization</label>
          <select id="orgPicker"></select>
        </div>
        <div id="orgList" class="list org-list-desktop"></div>
        <div id="orgListEmpty" class="empty hidden">No organizations found.</div>
      </div>
    </section>
    <section class="card">
      <div class="head"><div><b id="orgTitle">Organization details</b><div class="sub" id="orgSub"></div></div><div class="actions" id="orgActions"></div></div>
      <div class="body">
        <div id="orgKv" class="kv"></div>
        <h3 id="orgMembersTitle" style="margin:18px 0 10px">Members</h3>
        <div class="toolbar" style="margin:18px 0 10px"><span></span><button class="btn small" id="addMemberBtn" type="button">Add member</button></div>
        <table><thead><tr><th>Member</th><th>Status</th><th>PIN fingerprint</th><th>Actions</th></tr></thead><tbody id="orgMembers"></tbody></table>
        <div id="iamMsg" class="msg hidden"></div>
      </div>
    </section>
  </div>
</main>
<div id="addMemberPopup" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="addMemberTitle">
  <div class="card add-member-card">
    <div class="body">
      <h2 id="addMemberTitle" style="margin:0 0 10px;font-size:18px;font-weight:900">Add member</h2>
      <label for="addMemberId">Member id</label>
      <input id="addMemberId" autocomplete="off" spellcheck="false">
      <label for="addMemberLabel">Member label</label>
      <input id="addMemberLabel" autocomplete="off">
      <label for="addMemberSecret">Member secret</label>
      <input id="addMemberSecret" autocomplete="off" spellcheck="false">
      <div id="addMemberMsg" class="msg err hidden"></div>
    </div>
    <div class="add-member-actions">
      <button class="btn" id="addMemberCancelBtn" type="button">Cancel</button>
      <button class="btn primary" id="addMemberSubmitBtn" type="button">Add member</button>
    </div>
  </div>
</div>
<div id="editMemberPopup" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="editMemberTitle">
  <div class="card add-member-card">
    <div class="body">
      <h2 id="editMemberTitle" style="margin:0 0 10px;font-size:18px;font-weight:900">Edit member</h2>
      <label for="editMemberId">Member id</label>
      <input id="editMemberId" readonly>
      <label for="editMemberLabel">Member label</label>
      <input id="editMemberLabel" autocomplete="off">
      <label for="editMemberStatus">Status</label>
      <input id="editMemberStatus" readonly>
      <label for="editMemberPinFingerprint">PIN fingerprint</label>
      <input id="editMemberPinFingerprint" class="mono" readonly>
      <div id="editMemberMsg" class="msg err hidden"></div>
    </div>
    <div class="add-member-actions">
      <button class="btn" id="editMemberCancelBtn" type="button">Cancel</button>
      <button class="btn primary" id="editMemberSubmitBtn" type="button">Save changes</button>
    </div>
  </div>
</div>
<div id="editClinicPopup" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="editClinicTitle">
  <div class="card add-member-card">
    <div class="body">
      <h2 id="editClinicTitle" style="margin:0 0 10px;font-size:18px;font-weight:900">Edit clinic</h2>
      <label for="editClinicCode">Clinic login name (username)</label>
      <input id="editClinicCode" class="mono" readonly>
      <label for="editClinicDisplayName">Clinic display name</label>
      <input id="editClinicDisplayName" autocomplete="off">
      <label for="editClinicLinkedClient">Linked invoicing client</label>
      <select id="editClinicLinkedClient">
        <option value="">No client link</option>
      </select>
      <label for="editClinicDisplayColor">Display color</label>
      <div class="color-field">
        <div class="color-input-wrap">
          <input id="editClinicDisplayColor" autocomplete="off" spellcheck="false" placeholder="#7c3aed">
          <button type="button" id="editClinicDisplayColorPreview" class="color-input-preview" aria-label="Choose display color" aria-haspopup="listbox" aria-expanded="false">
            <span class="color-input-preview-mark" aria-hidden="true">?</span>
          </button>
          <div id="editClinicColorPalettePop" class="color-palette-pop hidden">
            <div id="editClinicColorPalette" class="color-palette" role="listbox" aria-label="Display color presets"></div>
          </div>
        </div>
      </div>
      <div id="editClinicMsg" class="msg err hidden"></div>
    </div>
    <div class="add-member-actions">
      <button class="btn" id="editClinicCancelBtn" type="button">Cancel</button>
      <button class="btn primary" id="editClinicSubmitBtn" type="button">Save changes</button>
    </div>
  </div>
</div>
<div id="rotateSecretPopup" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="rotateSecretTitle">
  <div class="card add-member-card">
    <div class="body">
      <h2 id="rotateSecretTitle" style="margin:0 0 10px;font-size:18px;font-weight:900">Rotate secret</h2>
      <label for="rotateSecretMemberId">Member id</label>
      <input id="rotateSecretMemberId" readonly>
      <label for="rotateSecretMemberLabel">Member label</label>
      <input id="rotateSecretMemberLabel" readonly>
      <label for="rotateSecretValue">New secret</label>
      <input id="rotateSecretValue" autocomplete="off" spellcheck="false">
      <div id="rotateSecretMsg" class="msg err hidden"></div>
    </div>
    <div class="add-member-actions">
      <button class="btn" id="rotateSecretCancelBtn" type="button">Cancel</button>
      <button class="btn primary" id="rotateSecretSubmitBtn" type="button">Rotate secret</button>
    </div>
  </div>
</div>
<div id="statusConfirmPopup" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="statusConfirmTitle">
  <div class="card confirm-popup-card">
    <div class="body">
      <h2 id="statusConfirmTitle" style="margin:0 0 10px;font-size:18px;font-weight:900"></h2>
      <p id="statusConfirmText" class="confirm-popup-text"></p>
      <div id="statusConfirmMsg" class="msg err hidden"></div>
    </div>
    <div class="confirm-popup-actions">
      <button class="btn" id="statusConfirmBackBtn" type="button">Cancel</button>
      <button class="btn" id="statusConfirmYesBtn" type="button"></button>
    </div>
  </div>
</div>
<div id="newClinicPopup" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="newClinicTitle">
  <div class="card add-member-card">
    <div class="body">
      <h2 id="newClinicTitle" style="margin:0 0 10px;font-size:18px;font-weight:900">New clinic</h2>
      <label for="newClinicLinkedClient">Linked invoicing client</label>
      <select id="newClinicLinkedClient">
        <option value="">No client link</option>
      </select>
      <div class="sub" style="margin-top:4px">Select a client to prefill clinic details.</div>
      <label for="newClinicCode">Clinic login name (username)</label>
      <input id="newClinicCode" autocomplete="off" spellcheck="false">
      <label for="newClinicDisplayName">Clinic display name</label>
      <input id="newClinicDisplayName" autocomplete="off">
      <label for="newClinicDisplayColor">Display color</label>
      <div class="color-field">
        <div class="color-input-wrap">
          <input id="newClinicDisplayColor" autocomplete="off" spellcheck="false" placeholder="#7c3aed">
          <button type="button" id="newClinicDisplayColorPreview" class="color-input-preview" aria-label="Choose display color" aria-haspopup="listbox" aria-expanded="false">
            <span class="color-input-preview-mark" aria-hidden="true">?</span>
          </button>
          <div id="newClinicColorPalettePop" class="color-palette-pop hidden">
            <div id="newClinicColorPalette" class="color-palette" role="listbox" aria-label="Display color presets"></div>
          </div>
        </div>
      </div>
      <label for="newClinicMemberId">Initial member id</label>
      <input id="newClinicMemberId" autocomplete="off" spellcheck="false">
      <label for="newClinicMemberLabel">Initial member label</label>
      <input id="newClinicMemberLabel" autocomplete="off">
      <label for="newClinicSecret">Initial member secret</label>
      <input id="newClinicSecret" autocomplete="off" spellcheck="false">
      <div id="newClinicMsg" class="msg err hidden"></div>
    </div>
    <div class="add-member-actions">
      <button class="btn" id="newClinicCancelBtn" type="button">Cancel</button>
      <button class="btn primary" id="newClinicSubmitBtn" type="button">Create clinic</button>
    </div>
  </div>
</div>
<div id="secretConfirmPopup" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="secretConfirmTitle">
  <div class="card add-member-card">
    <div class="body">
      <h2 id="secretConfirmTitle" style="margin:0 0 10px;font-size:18px;font-weight:900"></h2>
      <p id="secretConfirmWarning" class="sub" style="margin:0 0 12px"></p>
      <label for="secretConfirmValue" id="secretConfirmLabel">Secret</label>
      <div class="secret-input-row">
        <input id="secretConfirmValue" class="mono" readonly>
        <button class="btn circle-icon" id="secretConfirmCopyBtn" type="button" aria-label="Copy secret" title="Copy to clipboard">
          <svg class="copy-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="2"></rect><path d="M5 15V6a2 2 0 0 1 2-2h9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
        </button>
      </div>
      <div id="secretConfirmMsg" class="msg err hidden"></div>
    </div>
    <div class="add-member-actions">
      <button class="btn primary" id="secretConfirmBackBtn" type="button">Done</button>
      <button class="btn primary hidden" id="secretConfirmYesBtn" type="button" hidden></button>
    </div>
  </div>
</div>
<div id="addMemberCopyPop" class="copy-feedback-pop hidden" role="status" aria-live="polite">Copied</div>
<script src="/js/auth-page-guard.js"></script>
<script src="/js/app-chrome.js"></script>
<script>
const $=id=>document.getElementById(id), api=(u,o={})=>fetch(u,{headers:{'content-type':'application/json',...(o.headers||{})},...o});
let actor=null, selectedCode=null, selectedOrg=null, orgs=[], iamClients=[], addMemberBusy=false, addMemberCopyPopTimer=null, editMemberBusy=false, editingMemberId=null, editClinicBusy=false, editClinicColorPaletteOpen=false, rotateSecretBusy=false, rotatingMemberId=null, statusConfirmBusy=false, statusConfirmRequest=null, newClinicBusy=false, newClinicPrefillBusy=false, newClinicColorPaletteOpen=false;
const appChrome=AppChrome.mount(document.getElementById('appChromeMount'),{product:'iam',logoSrc:'images/logo.png',brandClick:()=>loadAll(),menuButtonClass:'btn'});
appChrome.onLogout(async()=>{await api('/api/scheduling/auth/logout',{method:'POST',body:'{}'});actor=null;window.location.replace('/login')});
function esc(v){return String(v??'').replace(/[&<>\"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]))}
function statusChip(active){return `<span class="chip ${active?'active':'inactive'}">${active?'Active':'Inactive'}</span>`}
function orgTypeLabel(type){return type==='lab'?'Lab':'Clinic'}
function formatDateTimeBulgarian(value){if(!value)return '—';const d=new Date(value);if(Number.isNaN(d.getTime()))return String(value);const date=new Intl.DateTimeFormat('bg-BG',{day:'2-digit',month:'2-digit',year:'numeric'}).format(d);const time=new Intl.DateTimeFormat('bg-BG',{hour:'2-digit',minute:'2-digit',hour12:false}).format(d);return `${date}, ${time}`}
function orgTitleLabel(type){return type==='lab'?'Lab profile':'Clinic organization'}
function orgMembersTitleLabel(type){return type==='lab'?'Lab members':'Clinic members'}
function genSecret(){return String(Math.floor(100000+Math.random()*900000))}
const CLINIC_COLOR_PALETTE=['#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#14b8a6','#06b6d4','#0ea5e9','#3b82f6','#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899','#f43f5e','#fb7185','#fdba74','#fcd34d','#bef264','#4ade80','#2dd4bf','#22d3ee','#38bdf8','#60a5fa','#818cf8','#a78bfa','#c084fc','#e879f9','#f472b6','#7c3aed'];
const HEX_COLOR_RE=/^#[0-9A-Fa-f]{6}$/;
function normalizeHexColor(value){const v=(value||'').trim();if(!HEX_COLOR_RE.test(v))return null;return v.toLowerCase()}
function closeNewClinicColorPalette(){newClinicColorPaletteOpen=false;const pop=$('newClinicColorPalettePop');const btn=$('newClinicDisplayColorPreview');if(pop)pop.classList.add('hidden');if(btn)btn.setAttribute('aria-expanded','false')}
function openNewClinicColorPalette(){if(newClinicBusy)return;newClinicColorPaletteOpen=true;$('newClinicColorPalettePop').classList.remove('hidden');$('newClinicDisplayColorPreview').setAttribute('aria-expanded','true')}
function toggleNewClinicColorPalette(){if(newClinicColorPaletteOpen)closeNewClinicColorPalette();else openNewClinicColorPalette()}
function syncNewClinicColorUi(){const color=normalizeHexColor($('newClinicDisplayColor').value);const preview=$('newClinicDisplayColorPreview');if(color){preview.style.background=color;preview.classList.add('has-color')}else{preview.style.background='#fff';preview.classList.remove('has-color')}preview.disabled=!!newClinicBusy;const palette=$('newClinicColorPalette');if(palette){palette.querySelectorAll('.color-palette-btn').forEach(btn=>btn.classList.toggle('active',!!color&&btn.dataset.color===color));palette.querySelectorAll('.color-palette-btn').forEach(btn=>{btn.disabled=!!newClinicBusy})}}
function renderNewClinicColorPalette(){const root=$('newClinicColorPalette');if(!root)return;root.innerHTML=CLINIC_COLOR_PALETTE.map(c=>`<button type="button" class="color-palette-btn" data-color="${c}" style="--swatch-color:${c}" aria-label="${c}" title="${c}"></button>`).join('');root.querySelectorAll('.color-palette-btn').forEach(btn=>{btn.onclick=()=>{if(newClinicBusy)return;$('newClinicDisplayColor').value=btn.dataset.color;syncNewClinicColorUi();closeNewClinicColorPalette()}})}
function setNewClinicDisplayColor(value){$('newClinicDisplayColor').value=value||'';syncNewClinicColorUi()}
function closeEditClinicColorPalette(){editClinicColorPaletteOpen=false;const pop=$('editClinicColorPalettePop');const btn=$('editClinicDisplayColorPreview');if(pop)pop.classList.add('hidden');if(btn)btn.setAttribute('aria-expanded','false')}
function openEditClinicColorPalette(){if(editClinicBusy)return;editClinicColorPaletteOpen=true;$('editClinicColorPalettePop').classList.remove('hidden');$('editClinicDisplayColorPreview').setAttribute('aria-expanded','true')}
function toggleEditClinicColorPalette(){if(editClinicColorPaletteOpen)closeEditClinicColorPalette();else openEditClinicColorPalette()}

async function submitStatusConfirm(){if(!selectedOrg||statusConfirmBusy||!statusConfirmRequest)return;const req=statusConfirmRequest;if(req.kind==='rotate-secret-precheck'){const secret=($('rotateSecretValue').value||'').trim();const msg=$('statusConfirmMsg');if(!secret||!rotatingMemberId){msg.textContent='New secret is required.';msg.className='msg err';msg.classList.remove('hidden');return}closeStatusConfirmPopup(true);await submitRotateSecret();return}const active=req.active;const msg=$('statusConfirmMsg');const yesBtn=$('statusConfirmYesBtn');const backBtn=$('statusConfirmBackBtn');const defaultYes=statusConfirmCopy(req).yes;statusConfirmBusy=true;yesBtn.disabled=true;backBtn.disabled=true;yesBtn.textContent=active?'Reactivating…':'Deactivating…';msg.classList.add('hidden');try{let url=`/api/iam/organizations/${encodeURIComponent(selectedOrg.code)}`;let method=active?'POST':'DELETE';let body=active?'{}':undefined;if(req.kind==='member'){url+=`/members/${encodeURIComponent(req.memberId)}`;if(active)url+='/reactivate';else{method='DELETE';body=undefined}}else if(active){url+='/reactivate'}const r=await api(url,{method,body});const j=await r.json().catch(()=>({}));if(!r.ok){msg.textContent=j.error||'Status change failed.';msg.className='msg err';msg.classList.remove('hidden');return}closeStatusConfirmPopup(true);if(req.kind==='clinic')$('includeInactive').checked=true;await loadOrganization(selectedOrg.code);await loadOrganizations();if(req.kind==='clinic')toast(active?'Clinic reactivated.':'Clinic deactivated and sessions revoked.');else toast(active?'Member reactivated.':'Member deactivated and sessions revoked.')}finally{statusConfirmBusy=false;yesBtn.disabled=false;backBtn.disabled=false;yesBtn.textContent=defaultYes}}
async function requestAddMember(){if(!selectedOrg||addMemberBusy)return;const id=($('addMemberId').value||'').trim();const label=($('addMemberLabel').value||'').trim();const secret=($('addMemberSecret').value||'').trim();const msg=$('addMemberMsg');if(!id||!label||!secret){msg.textContent='Member id, label, and secret are required.';msg.className='msg err';msg.classList.remove('hidden');return}msg.classList.add('hidden');await submitAddMember()}
async function requestRotateSecret(){if(!selectedOrg||rotateSecretBusy||!rotatingMemberId||statusConfirmBusy)return;const secret=($('rotateSecretValue').value||'').trim();const msg=$('rotateSecretMsg');if(!secret){msg.textContent='New secret is required.';msg.className='msg err';msg.classList.remove('hidden');return}msg.classList.add('hidden');if(selectedOrg.organizationType==='lab')return openRotateSecretPrecheckPopup();await submitRotateSecret()}
async function submitAddMember(){if(!selectedOrg||addMemberBusy)return;const id=($('addMemberId').value||'').trim();const label=($('addMemberLabel').value||'').trim();const secret=($('addMemberSecret').value||'').trim();const msg=$('addMemberMsg');addMemberBusy=true;$('addMemberSubmitBtn').disabled=true;$('addMemberCancelBtn').disabled=true;$('addMemberSubmitBtn').textContent='Adding…';msg.classList.add('hidden');try{const r=await api(`/api/iam/organizations/${encodeURIComponent(selectedOrg.code)}/members`,{method:'POST',body:JSON.stringify({id,label,secret})});const j=await r.json().catch(()=>({}));if(!r.ok){msg.textContent=j.error||'Add member failed.';msg.className='msg err';msg.classList.remove('hidden');return}$('addMemberPopup').classList.add('hidden');await loadOrganization(selectedOrg.code);await loadOrganizations();openSecretRevealPopup('add-member',secret)}finally{addMemberBusy=false;$('addMemberSubmitBtn').disabled=false;$('addMemberCancelBtn').disabled=false;$('addMemberSubmitBtn').textContent='Add member'}}
async function submitEditMember(){if(!selectedOrg||editMemberBusy||!editingMemberId)return;const label=($('editMemberLabel').value||'').trim();const msg=$('editMemberMsg');if(!label){msg.textContent='Member label is required.';msg.className='msg err';msg.classList.remove('hidden');return}editMemberBusy=true;$('editMemberSubmitBtn').disabled=true;$('editMemberCancelBtn').disabled=true;$('editMemberSubmitBtn').textContent='Saving…';msg.classList.add('hidden');try{const r=await api(`/api/iam/organizations/${encodeURIComponent(selectedOrg.code)}/members/${encodeURIComponent(editingMemberId)}`,{method:'PUT',body:JSON.stringify({label})});const j=await r.json().catch(()=>({}));if(!r.ok){msg.textContent=j.error||'Member update failed.';msg.className='msg err';msg.classList.remove('hidden');return}$('editMemberPopup').classList.add('hidden');editingMemberId=null;await loadOrganization(selectedOrg.code);await loadOrganizations();toast('Member updated.')}finally{editMemberBusy=false;$('editMemberSubmitBtn').disabled=false;$('editMemberCancelBtn').disabled=false;$('editMemberSubmitBtn').textContent='Save changes'}}
async function submitRotateSecret(){if(!selectedOrg||rotateSecretBusy||!rotatingMemberId)return;const secret=($('rotateSecretValue').value||'').trim();const msg=$('rotateSecretMsg');rotateSecretBusy=true;$('rotateSecretSubmitBtn').disabled=true;$('rotateSecretCancelBtn').disabled=true;$('rotateSecretSubmitBtn').textContent='Rotating…';msg.classList.add('hidden');try{const r=await api(`/api/iam/organizations/${encodeURIComponent(selectedOrg.code)}/members/${encodeURIComponent(rotatingMemberId)}/secret`,{method:'POST',body:JSON.stringify({secret})});const j=await r.json().catch(()=>({}));if(!r.ok){msg.textContent=j.error||'Secret rotation failed.';msg.className='msg err';msg.classList.remove('hidden');return}$('rotateSecretPopup').classList.add('hidden');rotatingMemberId=null;await loadOrganization(selectedOrg.code);await loadOrganizations();openSecretRevealPopup('rotate-secret',secret)}finally{rotateSecretBusy=false;$('rotateSecretSubmitBtn').disabled=false;$('rotateSecretCancelBtn').disabled=false;$('rotateSecretSubmitBtn').textContent='Rotate secret'}}
async function updateMember(action,id){if(!selectedOrg)return;if(action==='edit')return openEditMemberPopup(id);if(action==='secret')return openRotateSecretPopup(id);if(action==='deactivate')return openStatusConfirmPopup({kind:'member',active:false,memberId:id});if(action==='reactivate')return openStatusConfirmPopup({kind:'member',active:true,memberId:id})}
$('reloadBtn').onclick=()=>loadAll();
$('newClinicBtn').onclick=openNewClinicPopup;
$('newClinicSubmitBtn').onclick=requestNewClinic;
$('newClinicCancelBtn').onclick=closeNewClinicPopup;
$('newClinicLinkedClient').addEventListener('change',prefillNewClinicFromClient);

$('newClinicDisplayColor').addEventListener('input',syncNewClinicColorUi);
$('newClinicDisplayColor').addEventListener('focus',closeNewClinicColorPalette);
document.addEventListener('click',e=>{if(newClinicColorPaletteOpen&&!e.target.closest('.color-input-wrap'))closeNewClinicColorPalette();if(editClinicColorPaletteOpen&&!e.target.closest('.color-input-wrap'))closeEditClinicColorPalette()});
$('newClinicPopup').onclick=e=>{if(e.target===$('newClinicPopup'))closeNewClinicPopup()};
renderNewClinicColorPalette();

$('editClinicCancelBtn').onclick=closeEditClinicPopup;
$('editClinicDisplayColorPreview').onclick=e=>{e.stopPropagation();toggleEditClinicColorPalette()};
$('editClinicDisplayColor').addEventListener('input',syncEditClinicColorUi);
$('editClinicDisplayColor').addEventListener('focus',closeEditClinicColorPalette);
$('editClinicPopup').onclick=e=>{if(e.target===$('editClinicPopup'))closeEditClinicPopup()};
$('addMemberBtn').onclick=openAddMemberPopup;
$('addMemberSubmitBtn').onclick=requestAddMember;
$('addMemberCancelBtn').onclick=closeAddMemberPopup;
$('editMemberSubmitBtn').onclick=submitEditMember;
$('editMemberCancelBtn').onclick=closeEditMemberPopup;
$('rotateSecretSubmitBtn').onclick=requestRotateSecret;
$('rotateSecretCancelBtn').onclick=closeRotateSecretPopup;
$('secretConfirmBackBtn').onclick=closeSecretConfirmPopup;
$('secretConfirmCopyBtn').onclick=copySecretConfirmValue;
$('secretConfirmPopup').onclick=e=>{if(e.target===$('secretConfirmPopup'))closeSecretConfirmPopup()};
$('statusConfirmBackBtn').onclick=closeStatusConfirmPopup;
$('statusConfirmYesBtn').onclick=submitStatusConfirm;
$('statusConfirmPopup').onclick=e=>{if(e.target===$('statusConfirmPopup'))closeStatusConfirmPopup()};
$('addMemberPopup').onclick=e=>{if(e.target===$('addMemberPopup'))closeAddMemberPopup()};
$('editMemberPopup').onclick=e=>{if(e.target===$('editMemberPopup'))closeEditMemberPopup()};
$('rotateSecretPopup').onclick=e=>{if(e.target===$('rotateSecretPopup'))closeRotateSecretPopup()};
['addMemberId','addMemberLabel','addMemberSecret'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();requestAddMember()}}));
$('editMemberLabel').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submitEditMember()}});
$('rotateSecretValue').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();requestRotateSecret()}});
['editClinicDisplayName','editClinicDisplayColor'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submitEditClinic()}}));
['newClinicCode','newClinicDisplayName','newClinicDisplayColor','newClinicMemberId','newClinicMemberLabel','newClinicSecret'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();requestNewClinic()}}));
document.addEventListener('keydown',e=>{if(e.key!=='Escape')return;if(!$('secretConfirmPopup').classList.contains('hidden')){e.preventDefault();closeSecretConfirmPopup();return}if(!$('statusConfirmPopup').classList.contains('hidden')){e.preventDefault();closeStatusConfirmPopup();return}if(!$('newClinicPopup').classList.contains('hidden')){if(newClinicColorPaletteOpen){e.preventDefault();closeNewClinicColorPalette();return}e.preventDefault();closeNewClinicPopup();return}if(!$('editClinicPopup').classList.contains('hidden')){if(editClinicColorPaletteOpen){e.preventDefault();closeEditClinicColorPalette();return}e.preventDefault();closeEditClinicPopup();return}if(!$('rotateSecretPopup').classList.contains('hidden')){e.preventDefault();closeRotateSecretPopup();return}if(!$('editMemberPopup').classList.contains('hidden')){e.preventDefault();closeEditMemberPopup();return}if(!$('addMemberPopup').classList.contains('hidden')){e.preventDefault();closeAddMemberPopup()}});
$('includeInactive').addEventListener('change',()=>loadOrganizations());
$('orgPicker').addEventListener('change',()=>{const code=($('orgPicker').value||'').trim();if(code)loadOrganization(code)});
$('orgMembers').addEventListener('click',e=>{const b=e.target.closest('button[data-member-action]');if(b)updateMember(b.dataset.memberAction,b.dataset.member)});
loadAll();
</script>
