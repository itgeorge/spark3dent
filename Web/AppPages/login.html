<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spark3Dent Вход</title>
  <link rel="icon" href="/images/logo.png" />
  <style>
    :root{--a2:#7c3aed;--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--shadow:0 8px 30px rgba(15,23,42,.08);--radius:16px}
    *{box-sizing:border-box}html,body{min-height:100%}body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);background:radial-gradient(900px 500px at 15% -10%,rgba(34,193,195,.14),transparent),radial-gradient(900px 500px at 90% -10%,rgba(124,58,237,.14),transparent),var(--bg)}
    .auth-shell{min-height:100vh;display:grid;place-items:center;padding:24px}.auth-card{width:min(100%,520px);background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.auth-card-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}.auth-card-head img{width:38px;height:38px;border-radius:10px;object-fit:contain}.auth-card-body{padding:20px}.auth-card-body label{display:block;margin:12px 0 6px;font-size:12px;font-weight:800;color:var(--muted)}.auth-card-body input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;font:inherit}.btn{border:1px solid var(--border);border-radius:12px;background:white;padding:10px 13px;font-weight:750;cursor:pointer}.btn.primary{background:linear-gradient(180deg,#7c3aed,#6d28d9);color:white;border-color:#7c3aed}.btn:disabled{opacity:.55;cursor:not-allowed}.auth-msg{margin-top:12px;padding:10px 12px;border:1px solid #fecaca;border-radius:12px;color:#991b1b;background:#fff1f2;font-size:13px}.hidden{display:none!important}.sub{font-size:13px;color:var(--muted);margin-top:2px}
  </style>
</head>
<body>
  <main class="auth-shell" aria-label="Spark3Dent login">
    <section class="auth-card">
      <div class="auth-card-head"><img src="/images/logo.png" alt="" aria-hidden="true"><div><h1 style="margin:0;font-size:18px;">Spark3Dent</h1><div class="sub">Вход</div></div></div>
      <div class="auth-card-body">
        <label for="organizationCode">Потребителско име / организация</label>
        <input id="organizationCode" autocomplete="username" autofocus>
        <label for="pin">Парола</label>
        <input id="pin" type="password" autocomplete="current-password">
        <button class="btn primary" id="loginBtn" type="button" style="width:100%;margin-top:16px;">Вход</button>
        <div id="loginMsg" class="auth-msg hidden"></div>
      </div>
    </section>
  </main>
  <script src="/js/login-page.js"></script>
</body>
</html>
