<body class="auth-locked">
<header>
  <div id="appChromeMount"></div>
</header>
<main class="wrap">
  <section id="login" class="auth-shell" aria-label="Scheduler login">
    <div class="auth-card">
      <div class="auth-card-head">
        <img src="/images/logo.png" alt="" aria-hidden="true">
        <div><h1 style="margin:0;font-size:18px;">Spark3Dent Scheduler</h1></div>
      </div>
      <div class="auth-card-body">
        <label for="clinic">Clinic code</label>
        <input id="clinic" value="DEMO" autocomplete="username">
        <label for="pin">Password</label>
        <input id="pin" type="password" value="123456" autocomplete="current-password">
        <button class="btn primary" id="loginBtn" type="button" style="width:100%;margin-top:16px;">Enter</button>
        <div id="loginMsg" class="auth-msg hidden"></div>
      </div>
    </div>
  </section>

  <section id="list" class="card hidden">
    <div class="head"><div><b>Submitted orders</b><div class="sub" id="listSub">Loading…</div></div><div class="actions"><button class="btn" id="reloadOrdersBtn" type="button">Refresh</button><button class="btn primary" id="newOrderBtn" type="button">+ New order</button></div></div>
    <div class="body">
      <div id="ordersEmpty" class="msg hidden">No orders yet.</div>
      <div style="overflow:auto"><table class="review" aria-label="Submitted orders"><thead><tr><th class="col-code">Code</th><th class="col-case">Case</th><th class="col-teeth">Teeth</th><th class="col-shade">Shade</th><th class="col-delivery">Delivery</th><th class="col-action" aria-label="Action"></th></tr></thead><tbody id="ordersBody"></tbody></table></div>
      <div id="ordersMsg" class="msg err hidden"></div>
    </div>
  </section>


  <section id="reviewCard" class="card hidden" aria-hidden="true">
    <div class="review-panel" role="region" aria-labelledby="reviewTitle">
      <div class="head"><div><b id="reviewTitle">Order review</b><div class="sub" id="reviewSub">Read-only order details</div></div><button class="btn circle-back" id="reviewBackIconBtn" type="button" aria-label="Back">←</button></div>
      <div class="body">
        <div class="overview">
          <div class="overview-body">
            <div class="overview-main">
              <div><div class="sub">Order code</div><div class="code" id="reviewCode">—</div></div>
              <h2 class="overview-title">Overview</h2>
              <div class="overview-details">
                <p id="reviewOverviewText" class="overview-summary" aria-label="Order overview"></p>
                <p id="reviewOverviewShade" class="overview-summary overview-shade hidden" aria-label="Shade"></p>
                <p id="reviewCaseName" class="overview-summary" aria-label="Case name"></p>
                <p id="reviewExtraNote" class="overview-summary hidden" aria-label="Extra lab note"></p>
                <input id="reviewOverviewDate" class="overview-text" type="text" readonly aria-label="Requested delivery date" value="">
              </div>
            </div>
            <div class="selected-teeth-preview-wrap" id="reviewTeeth"></div>
          </div>
        </div>
        <div id="reviewMsg" class="msg err hidden"></div>
        <div class="review-bottom-actions card-edge-separator">
          <button class="btn" id="reviewBackTopBtn" type="button">Back</button>
          <div class="right">
            <button class="btn danger" id="reviewCancelBtn" type="button">Cancel order</button>
            <button class="btn primary" id="reviewEditBtn" type="button">Edit order</button>
          </div>
        </div>
      </div>
    </div>
  </section>
  <section id="app" class="card hidden">

function renderOverviewInto(textEl,shadeEl,dateEl,teethEl){const range=selectedTeethRange();setOverviewField(textEl,overviewOrderBaseText());setOverviewShade(shadeEl,overviewShadeLine());setOverviewField(dateEl,deadline.value||selectedDate?formatDateBulgarianWithWeekday(deadline.value||selectedDate):'');syncOverviewBodyLayout(teethEl?.closest('.overview-body'),range);renderSelectedTeethPreview(teethEl,range)}
function renderOverview(){renderOverviewInto(overviewText,overviewShade,overviewDate,overviewTeeth)}
function renderFinalOverview(){renderOverviewInto(finalOverviewText,finalOverviewShade,finalOverviewDate,finalOverviewTeeth);setOverviewField(finalCaseName,caseName.value.trim());const note=extraNote.value.trim();if(finalExtraNote){setOverviewField(finalExtraNote,note?`Note: ${note}`:'');finalExtraNote.classList.toggle('hidden',!note)}}
function resetForwardProgress(changedStage){const resetFrom=changedStage<3?3:changedStage;if(changedStage<3){const currentDelivery=deadline.value||selectedDate;if(currentDelivery)calendarMonth=monthForIso(currentDelivery)}let didReset=false;for(const s of [...completedSteps]){if(s>=resetFrom){completedSteps.delete(s);didReset=true}}if(orderCreated){orderCreated=false;didReset=true;code.textContent='—'}if(step===5&&!orderCreated)step=resetFrom;if(didReset)render()}
function draft(delivery=deadline.value||selectedDate||'',start=impression.value,end='2026-07-05'){const d={caseName:caseName.value,impressionDate:impression.value,productCategory:productCategory(),workType:workType(),material,constructionType:backendConstruction(),toothStart:+ts.value,toothEnd:+te.value,requestedDeliveryDate:delivery,shade:shade.value,notes:extraNote.value,start,end};if(actor?.isTechnician&&!editMode&&targetClinic.value)d.clinicCode=targetClinic.value;return d}
function showErr(t){err.textContent=t;err.classList.remove('hidden')}function clearErr(){err.classList.add('hidden')}
function validateStep(s){if(s===1){if(actor?.isTechnician&&!editMode&&!targetClinic.value)return 'Select a target clinic.';if(!construction)return 'Select a construction shape.';if(ts.value===''||te.value==='')return 'Select a tooth or range.';const t1=+ts.value,t2=+te.value;if(!teeth.includes(t1)||!teeth.includes(t2))return 'Select valid FDI tooth numbers.';if(construction==='crown'&&t1!==t2)return 'Crown must be exactly one tooth.';if(isRangeConstruction()){const range=fdiRangeTeeth(t1,t2);if(!range)return 'Start and end must be a contiguous range on the same jaw (FDI).';if(range.length<2)return 'Bridge/facet must span at least two teeth.'}return null}if(s===2){if(!material)return 'Select a material.';if(!shade.value)return 'Select a shade.';return null}if(s===3){const delivery=deadline.value||selectedDate;if(!delivery)return 'Select a deadline/delivery date.';return null}if(s===4){if(!caseName.value.trim())return 'Enter a case name.';return null}return null}
function maxCompletedStep(){return completedSteps.size?Math.max(...completedSteps):0}
function canGoToStep(target){if(target===step||target<1||target>5||step===5)return false;if(target<step)return true;const maxC=maxCompletedStep();if(completedSteps.has(target))return true;if(target!==maxC+1)return false;return target!==5||orderCreated}
function validateBeforeStep(target){for(let s=1;s<target;s++){const msg=validateStep(s);if(msg)return msg}return null}
function advanceTo(target){if(target>step){const msg=validateBeforeStep(target);if(msg)return showErr(msg)}step=target;render()}
function goToStep(target){if(!canGoToStep(target))return;advanceTo(target)}
function render(){clearErr();document.querySelectorAll('.pane').forEach((p,i)=>p.classList.toggle('hidden',i+1!==step));document.querySelectorAll('.step[data-s]').forEach(el=>{const s=+el.dataset.s;el.classList.toggle('active',s===step);el.classList.toggle('done',completedSteps.has(s));const clickable=canGoToStep(s);el.classList.toggle('clickable',clickable);el.classList.toggle('locked',!clickable&&!el.classList.contains('active'));el.setAttribute('role','button');el.tabIndex=clickable?0:-1;el.setAttribute('aria-disabled',clickable?'false':'true')});const nextLabel=step===5?'Done':'Next';document.querySelectorAll('.nav-back').forEach(b=>{const hide=step===5;b.disabled=step===1||hide;b.classList.toggle('hidden',hide);b.setAttribute('aria-hidden',hide?'true':'false')});document.querySelectorAll('.nav-next').forEach(b=>{b.textContent=nextLabel;b.classList.toggle('hidden',step===4||step===5);b.disabled=step===5});document.querySelector('.footer-bar .actions')?.classList.toggle('hidden',step===4||step===5);techClinicPicker.classList.toggle('hidden',!(actor?.isTechnician&&!editMode));overviewCreateOrder.textContent=editMode?'Save changes':'Create order';updateSummary();updateSelectedDeliveryDisplay();if(step===3)loadDates();if(step===4)renderOverview();if(step===5)renderFinalOverview();}
function dateUnavailableReason(status,day){if(status?.isSelectable)return '';if(status?.reason)return status.reason;if(isWeekendDate(day))return 'Weekend';return 'Unavailable'}
function hideDateReasonPop(){const pop=$('dateReasonPop');if(pop&&!pop.classList.contains('hidden'))pop.classList.add('hidden')}
function showDateReasonPop(anchor,text){const pop=$('dateReasonPop');if(!pop||!text)return hideDateReasonPop();pop.textContent=text;pop.classList.remove('hidden');const ar=anchor.getBoundingClientRect();let left=ar.left+ar.width/2-pop.offsetWidth/2,top=ar.bottom+8;left=Math.max(8,Math.min(left,window.innerWidth-pop.offsetWidth-8));if(top+pop.offsetHeight>window.innerHeight-8)top=ar.top-pop.offsetHeight-8;pop.style.left=`${left}px`;pop.style.top=`${top}px`}
function bindDateCellPop(cell,text){if(!text)return;cell.tabIndex=0;const show=()=>showDateReasonPop(cell,text);const hide=()=>hideDateReasonPop();cell.addEventListener('mouseenter',show);cell.addEventListener('mouseleave',hide);cell.addEventListener('focusin',show);cell.addEventListener('focusout',hide)}
function bindDateReasonPop(cell,status,day){bindDateCellPop(cell,dateUnavailableReason(status,day))}
function firstSelectableDate(dates){return dates.find(d=>d.isSelectable)?.date||''}
function isIsoAfter(a,b){return !!a&&!!b&&a>b}
function syncDeliverySelection(dates){const current=deadline.value||selectedDate;const byDate=new Map(dates.map(d=>[d.date,d]));const next=firstSelectableDate(dates);if(current){const status=byDate.get(current);if(status?.isSelectable){selectedDate=current;deadline.value=current;return false}const mayMove=status||deliveryPickSkips>0;if(!next||!mayMove||!isIsoAfter(next,current))return false;deadline.value=next;selectedDate=next;updateSummary();return true}if(!next)return false;deadline.value=next;selectedDate=next;updateSummary();return true}
function monthForIso(iso){const [y,m]=iso.split('-').map(Number);return new Date(y,m-1,1)}
function removeDateCreateOrderButtons(){document.querySelectorAll('.date-create-order').forEach(el=>el.remove())}

function buildCalendarGrid(bounds,byDate){const impressionIso=impression.value;const grid=document.createDocumentFragment();WEEKDAYS.forEach(w=>{const h=document.createElement('div');h.className='weekday';h.textContent=w;grid.appendChild(h)});for(let day=new Date(bounds.start);day<=bounds.end;day=addDays(day,1)){const iso=toIsoDate(day),status=byDate.get(iso)||{date:iso,isSelectable:false,reason:'Unavailable'},outside=!isSameCalendarMonth(day,calendarMonth),weekend=isWeekendDate(day),weekday=WEEKDAYS[(day.getDay()+6)%7],isImpression=iso===impressionIso;const cell=document.createElement('div');cell.className='date-cell';const b=document.createElement('button');b.className=['datebtn',outside?'outside-month':'',weekend?'weekend':'',isImpression?'impression-day':''].filter(Boolean).join(' ');b.type='button';b.disabled=!status.isSelectable;const main=document.createElement('div');main.className='date-main';const num=document.createElement('span');num.className='date-num';num.textContent=String(day.getDate());const wd=document.createElement('span');wd.className='date-weekday';wd.textContent=weekday.slice(0,3);main.append(num,wd);b.append(main);if(iso===deadline.value)b.classList.add('sel');if(status.isSelectable)b.onclick=()=>{resetForwardProgress(3);selectedDate=iso;deadline.value=iso;document.querySelectorAll('.datebtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');syncDateCreateOrderButton(b);updateSummary();updateSelectedDeliveryDisplay()};if(isImpression)bindDateCellPop(cell,'impression');else if(!status.isSelectable)bindDateReasonPop(cell,status,day);cell.appendChild(b);grid.appendChild(cell)}return grid}
async function ensureDeliveryDate(){if(deadline.value||selectedDate)return;syncImpressionToday();const startIso=impression.value,endIso=toIsoDate(addDays(new Date(startIso),90));const r=await api('/api/scheduling/dates',{method:'POST',body:JSON.stringify(draft(startIso,startIso,endIso))});const j=await r.json();if(r.ok&&j.dates)syncDeliverySelection(j.dates)}async function loadDates(){if(!dates)return;hideDateReasonPop();syncImpressionToday();const request=++calendarRequest;const month=calendarMonth,bounds=calendarBounds(month),startIso=toIsoDate(bounds.start),endIso=toIsoDate(bounds.end);const r=await api('/api/scheduling/dates',{method:'POST',body:JSON.stringify(draft(deadline.value||selectedDate||startIso,startIso,endIso))});const j=await r.json();if(request!==calendarRequest)return;if(!r.ok){dateMsg.textContent=j.error;dateMsg.className='msg err';return}const changed=syncDeliverySelection(j.dates);const picked=deadline.value||selectedDate;if(changed&&picked){deliveryPickSkips=0;const want=monthForIso(picked);if(want.getTime()!==calendarMonth.getTime()){calendarMonth=want;return loadDates()}}else if(!firstSelectableDate(j.dates)&&deliveryPickSkips<18){deliveryPickSkips++;calendarMonth=new Date(calendarMonth.getFullYear(),calendarMonth.getMonth()+1,1);return loadDates()}deliveryPickSkips=0;dateMsg.textContent='';dateMsg.className='msg hidden';updateSelectedDeliveryDisplay();hideDateReasonPop();const byDate=new Map(j.dates.map(d=>[d.date,d]));calTitle.textContent=MONTH_FMT.format(month);dates.replaceChildren(buildCalendarGrid(bounds,byDate));syncDateCreateOrderButton(dates.querySelector('.datebtn.sel'))}
async function createOrder(){const msg=validateBeforeStep(5);if(msg)return showErr(msg);await ensureDeliveryDate();const delivery=deadline.value||selectedDate;if(!delivery)return showErr('No delivery date available.');const url=editMode?`/api/scheduling/orders/${encodeURIComponent(editingOrder.orderCode)}`:'/api/scheduling/orders';const method=editMode?'PUT':'POST';const r=await api(url,{method,body:JSON.stringify(draft(delivery))});const j=await r.json().catch(()=>({error:'Could not save order.'}));if(!r.ok)return showErr(j.error||'Could not save order.');if(editMode){const savedCode=j.order.orderCode;editingOrder=null;editMode=false;reviewOrder=null;app.classList.add('hidden');reviewCard.classList.add('hidden');reviewCard.setAttribute('aria-hidden','true');listHighlightCode=savedCode;await loadOrders();list.classList.remove('hidden');highlightOrderInList(savedCode);return}createdOrder=j.order;code.textContent=j.order.shortenedOrderCode||j.order.orderCode;completedSteps.add(3);completedSteps.add(4);completedSteps.add(5);orderCreated=true;step=5;render();}
function statusText(s){return s==='cancelled'?'Cancelled':s==='created'?'Submitted':(s||'Submitted')}
function statusIconHtml(s){const cancelled=s==='cancelled';return `<span class="status-icon ${cancelled?'status-cancelled':'status-created'}" title="${statusText(s)}" aria-label="${statusText(s)}">${cancelled?'×':'✓'}</span>`}

function titleText(v){return String(v||'').replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase()).trim()}
function orderMaterialShort(o){return ({fullContourZirconia:'Zr',pfzLayeredZrCrown:'Layered Zr',pfm:'Metal-ceramic',glassCeramics:'Glass ceramic',pmma:'Temporary PMMA'})[o.material]||titleText(o.material)||'Material'}
function orderOverviewBaseText(o){if(o.constructionType==='crown'||o.toothStart===o.toothEnd)return `${orderMaterialShort(o)} crown on ${o.toothStart||'—'}`;return `${orderMaterialShort(o)} ${o.constructionType||'case'} ${o.toothStart||'—'}-${o.toothEnd||'—'}`}

function renderOrders(){ordersBody.innerHTML='';ordersEmpty.classList.toggle('hidden',orders.length>0);listSub.textContent=actor?`${actor.clinicName} / ${actor.credentialLabel}`:'';for(const o of orders){const tr=document.createElement('tr');const cancelled=o.status==='cancelled';tr.className=`review-row${cancelled?' review-row-cancelled':''}${listHighlightCode===o.orderCode?' review-row-highlight':''}`;tr.tabIndex=0;tr.dataset.code=o.orderCode;const teeth=o.toothStart===o.toothEnd?o.toothStart:`${o.toothStart}-${o.toothEnd}`;const delivery=cancelled?'—':formatDeliveryShortBg(o.requestedDeliveryDate);tr.innerHTML=`<td class="col-code"><span class="order-code-cell">${statusIconHtml(o.status)}<b>${esc(o.shortenedOrderCode||o.orderCode)}</b></span></td><td class="col-case">${esc(o.caseName||'—')}</td><td class="col-teeth">${esc(teeth)}<span class="mobile-shade"> · ${esc(shadeShort(o.shade))}</span></td><td class="col-shade">${esc(shadeDisplay(o.shade))}</td><td class="col-delivery">${esc(delivery)}</td><td class="col-action"><button class="btn" type="button" data-review-code="${esc(o.orderCode)}">View</button></td>`;tr.onclick=e=>{if(e.target.closest('button'))return;showReview(o.orderCode)};tr.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();showReview(o.orderCode)}};ordersBody.appendChild(tr)}}

async function showReview(codeToOpen){reviewMsg.classList.add('hidden');const r=await api(`/api/scheduling/orders/${encodeURIComponent(codeToOpen)}`);const j=await r.json().catch(()=>({error:'Could not load order.'}));if(!r.ok){ordersMsg.textContent=j.error||'Could not load order.';ordersMsg.classList.remove('hidden');return}reviewOrder=j.order;renderReview(reviewOrder);list.classList.add('hidden');app.classList.add('hidden');reviewCard.classList.remove('hidden');reviewCard.setAttribute('aria-hidden','false');reviewCard.scrollIntoView({block:'start'});reviewBackTopBtn.focus()}

if(!window.__reviewDateResizeBound){window.__reviewDateResizeBound=true;window.addEventListener('resize',()=>{if(reviewOrder&&!reviewCard.classList.contains('hidden')){const iso=reviewOrder.requestedDeliveryDate;reviewOverviewDate.value=iso?formatReviewDeliveryDate(iso):''}})}
function renderReview(o){reviewCode.textContent=o.shortenedOrderCode||o.orderCode||'—';reviewSub.textContent=`${statusText(o.status)} • ${o.clinicDisplayName||o.clinicCode||''}`;reviewOverviewText.textContent=orderOverviewBaseText(o);setOverviewShade(reviewOverviewShade,orderOverviewShadeLine(o));reviewCaseName.textContent=o.caseName||'—';reviewExtraNote.textContent=o.notes?`Note: ${o.notes}`:'';reviewExtraNote.classList.toggle('hidden',!o.notes);const cancelled=o.status==='cancelled';reviewEditBtn.disabled=cancelled;reviewCancelBtn.disabled=cancelled;const range=orderTeethRange(o);syncOverviewBodyLayout(reviewTeeth.closest('.overview-body'),range);reviewOverviewDate.value=o.requestedDeliveryDate?formatReviewDeliveryDate(o.requestedDeliveryDate):'';renderSelectedTeethPreview(reviewTeeth,range)}
function fillFormFromOrder(o){resetOrderForm();editMode=true;editingOrder=o;construction=o.constructionType;material=o.material;selectedJaw=+o.toothStart>=30?'lower':'upper';setToothRange(String(o.toothStart),String(o.toothEnd));shade.value=o.shade||UNSPECIFIED_SHADE;caseName.value=o.caseName||'';extraNote.value=o.notes||'';impression.value=o.impressionDate||new Date().toISOString().slice(0,10);deadline.value=o.requestedDeliveryDate||'';selectedDate=deadline.value;if(selectedDate)calendarMonth=monthForIso(selectedDate);document.querySelectorAll('#constructionChoices .choice').forEach(x=>x.classList.toggle('active',x.dataset.con===construction));document.querySelectorAll('#materialChoices .choice').forEach(x=>x.classList.toggle('active',x.dataset.mat===material));renderShadeChoices();completedSteps.add(1);completedSteps.add(2);completedSteps.add(3);step=1;updateSummary()}
