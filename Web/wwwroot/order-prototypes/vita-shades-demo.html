<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VITA Shade Guide Reference Demo</title>
  <link rel="icon" href="/images/logo.png" />
  <style>
    :root{--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--accent:#7c3aed;--warn:#92400e;--warn-bg:#fffbeb;--shadow:0 8px 30px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);background:radial-gradient(900px 500px at 15% -10%,rgba(34,193,195,.12),transparent),radial-gradient(900px 500px at 90% -10%,rgba(124,58,237,.12),transparent),var(--bg)}
    header{border-bottom:1px solid var(--border);background:rgba(248,250,252,.92);backdrop-filter:blur(10px);position:sticky;top:0;z-index:2}
    .bar{max-width:1200px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .bar img{width:34px;height:34px;border-radius:10px}
    .brand{font-weight:900;font-size:18px}.sub{font-size:12px;color:var(--muted)}
    .spacer{flex:1}
    .btn{border:1px solid var(--border);background:#fff;border-radius:12px;padding:10px 13px;font-weight:700;cursor:pointer;text-decoration:none;color:inherit}
    main{max-width:1200px;margin:0 auto;padding:22px;display:grid;gap:18px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
    .head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .head h2{margin:0;font-size:18px}.body{padding:18px}
    .pill{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:999px;padding:5px 10px;font-size:12px;color:var(--muted);background:#fff}
    .notice{padding:12px 14px;border:1px solid #fde68a;background:var(--warn-bg);border-radius:12px;color:var(--warn);font-size:13px;line-height:1.45}
    .meta-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .meta-item{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff}
    .meta-item b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px}
    .meta-item span{font-size:14px;font-weight:700}
    .shade-groups{display:flex;flex-wrap:wrap;gap:16px 20px}
    .shade-group{flex:1 1 220px;min-width:0;border:1px solid var(--border);border-radius:14px;padding:12px;background:#fff}
    .shade-group-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
    .shade-group-head b{font-size:18px}.shade-group-head span{font-size:12px;color:var(--muted)}
    .shade-group-cards{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
    .shade-card{width:112px;border:1px solid var(--border);border-radius:12px;padding:8px;background:#fff}
    .shade-swatch{display:block;width:100%;height:56px;border-radius:10px;border:1px solid rgba(15,23,42,.12)}
    .shade-code{display:block;margin-top:8px;font-size:14px;font-weight:900}
    .shade-lab{display:block;margin-top:4px;font-size:10px;color:var(--muted);line-height:1.35;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .shade-hex{display:block;margin-top:2px;font-size:10px;color:#475569;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .compare-table{width:100%;border-collapse:collapse;font-size:13px}
    .compare-table th,.compare-table td{border-bottom:1px solid var(--border);padding:10px 8px;text-align:left;vertical-align:middle}
    .compare-table th{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.04em}
    .mini-swatch{display:inline-block;width:28px;height:28px;border-radius:8px;border:1px solid rgba(15,23,42,.12);vertical-align:middle;margin-right:8px}
    .delta{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--muted)}
    .delta.high{color:#b45309;font-weight:700}
    .sources{display:grid;gap:10px}
    .source{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff;font-size:13px;line-height:1.45}
    .source b{display:block;margin-bottom:4px}
    .source a{color:var(--accent)}
    .source .covers{margin-top:6px;font-size:12px;color:var(--muted)}
    .err{padding:14px;border:1px solid #fecaca;background:#fff1f2;border-radius:12px;color:#991b1b}
    @media(max-width:900px){.meta-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div class="bar">
    <img src="/images/logo.png" alt="" />
    <div>
      <div class="brand">VITA Shade Guide Reference Demo</div>
      <div class="sub">Review dataset for future scheduling shade API</div>
    </div>
    <span class="pill" id="status">Loading reference data…</span>
    <div class="spacer"></div>
    <a class="btn" href="/order-prototypes/stepper.html">Stepper prototype</a>
    <a class="btn" href="/data/vita-shade-guide-reference.json">Raw JSON</a>
  </div>
</header>
<main id="app">
  <section class="card"><div class="body err" id="loadErr" hidden></div></section>
</main>
<script>
const REF_URL = '/data/vita-shade-guide-reference.json';

function labToRgb(L, a, b) {
  let fy = (L + 16) / 116;
  let fx = a / 500 + fy;
  let fz = fy - b / 200;
  const fInv = t => {
    const t3 = t * t * t;
    return t3 > 0.008856 ? t3 : (t - 16 / 116) / 7.787;
  };
  let x = 95.047 * fInv(fx) / 100;
  let y = 100 * fInv(fy) / 100;
  let z = 108.883 * fInv(fz) / 100;
  let r = x * 3.2406 + y * -1.5372 + z * -0.4986;
  let g = x * -0.9689 + y * 1.8758 + z * 0.0415;
  let bl = x * 0.0557 + y * -0.2040 + z * 1.0570;
  const gamma = c => c > 0.0031308 ? 1.055 * Math.pow(c, 1 / 2.4) - 0.055 : 12.92 * c;
  r = gamma(r); g = gamma(g); bl = gamma(bl);
  const clamp = v => Math.round(Math.min(255, Math.max(0, v * 255)));
  return { r: clamp(r), g: clamp(g), b: clamp(bl) };
}

function rgbToHex({ r, g, b }) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function hexToRgb(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(hex);
  if (!m) return null;
  const n = parseInt(m[1], 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

function deltaE76(l1, l2) {
  return Math.sqrt(
    Math.pow(l1.L - l2.L, 2) +
    Math.pow(l1.a - l2.a, 2) +
    Math.pow(l1.b - l2.b, 2)
  );
}

function render(data) {
  const sourceById = Object.fromEntries(data.sources.map(s => [s.id, s]));
  const rows = [];
  const groupsHtml = data.groups.map(group => {
    const cards = group.shades.map(shade => {
      const rgb = labToRgb(shade.lab.L, shade.lab.a, shade.lab.b);
      const hex = rgbToHex(rgb);
      const source = sourceById[shade.sourceId];
      const placeholder = data.uiPlaceholderColors?.shades?.[shade.code];
      const placeholderRgb = placeholder ? hexToRgb(placeholder) : null;
      const delta = placeholderRgb
        ? Math.round(Math.sqrt(
            Math.pow(rgb.r - placeholderRgb.r, 2) +
            Math.pow(rgb.g - placeholderRgb.g, 2) +
            Math.pow(rgb.b - placeholderRgb.b, 2)
          ))
        : null;
      rows.push({ code: shade.code, hex, placeholder, delta, lab: shade.lab, sourceId: shade.sourceId });
      return `<article class="shade-card" title="${source?.citation || ''}">
        <span class="shade-swatch" style="background:${hex}"></span>
        <b class="shade-code">${shade.code}</b>
        <span class="shade-lab">L* ${shade.lab.L.toFixed(2)}<br>a* ${shade.lab.a.toFixed(2)} · b* ${shade.lab.b.toFixed(2)}</span>
        <span class="shade-hex">${hex}</span>
      </article>`;
    }).join('');
    return `<section class="shade-group">
      <div class="shade-group-head"><b>${group.label}</b><span>${group.description}</span></div>
      <div class="shade-group-cards">${cards}</div>
    </section>`;
  }).join('');

  const compareRows = rows.map(row => {
    const deltaClass = row.delta != null && row.delta > 24 ? 'delta high' : 'delta';
    return `<tr>
      <td><b>${row.code}</b></td>
      <td><span class="mini-swatch" style="background:${row.hex}"></span>${row.hex}</td>
      <td><span class="mini-swatch" style="background:${row.placeholder || '#eee'}"></span>${row.placeholder || '—'}</td>
      <td class="${deltaClass}">${row.delta ?? '—'} RGB</td>
      <td>L* ${row.lab.L.toFixed(2)}, a* ${row.lab.a.toFixed(2)}, b* ${row.lab.b.toFixed(2)}</td>
      <td>${row.sourceId}</td>
    </tr>`;
  }).join('');

  const sourcesHtml = data.sources.map(source => `<article class="source">
    <b>${source.id}</b>
    <div>${source.citation}</div>
    ${source.doi ? `<div><a href="https://doi.org/${source.doi}" target="_blank" rel="noopener">doi:${source.doi}</a></div>` : ''}
    ${source.url ? `<div><a href="${source.url}" target="_blank" rel="noopener">${source.url}</a></div>` : ''}
    ${source.covers ? `<div class="covers">Covers: ${source.covers.join(', ')}</div>` : ''}
  </article>`).join('');

  document.getElementById('app').innerHTML = `
    <section class="card">
      <div class="head"><h2>Reference overview</h2><span class="pill">${data.groups.reduce((n,g)=>n+g.shades.length,0)} shades</span></div>
      <div class="body">
        <div class="notice">${data.meta.measurementNotes}</div>
        <div class="meta-grid" style="margin-top:14px">
          <div class="meta-item"><b>Color space</b><span>${data.meta.colorSpace} · ${data.meta.illuminant} · ${data.meta.observer}</span></div>
          <div class="meta-item"><b>Guides</b><span>${data.meta.productGuides.map(g => g.name).join(' + ')}</span></div>
          <div class="meta-item"><b>Display conversion</b><span>${data.meta.displayConversion.target} (${data.meta.displayConversion.method})</span></div>
        </div>
      </div>
    </section>
    <section class="card">
      <div class="head"><h2>Grouped swatches (reference L*a*b* → sRGB)</h2></div>
      <div class="body"><div class="shade-groups">${groupsHtml}</div></div>
    </section>
    <section class="card">
      <div class="head"><h2>Reference vs current UI placeholders</h2><span class="pill">From stepper / orders hardcoded hex</span></div>
      <div class="body">
        <div class="notice" style="margin-bottom:14px">${data.uiPlaceholderColors.note}</div>
        <table class="compare-table">
          <thead><tr><th>Code</th><th>Reference</th><th>UI placeholder</th><th>Δ RGB</th><th>CIELAB</th><th>Source</th></tr></thead>
          <tbody>${compareRows}</tbody>
        </table>
      </div>
    </section>
    <section class="card">
      <div class="head"><h2>Sources</h2></div>
      <div class="body"><div class="sources">${sourcesHtml}</div></div>
    </section>`;

  document.getElementById('status').textContent = 'Reference loaded';
}

async function init() {
  try {
    const res = await fetch(REF_URL);
    if (!res.ok) throw new Error(`Failed to load ${REF_URL}: HTTP ${res.status}`);
    render(await res.json());
  } catch (err) {
    document.getElementById('status').textContent = 'Load failed';
    const el = document.getElementById('loadErr');
    el.hidden = false;
    el.textContent = String(err.message || err);
  }
}

init();
</script>
</body>
</html>
