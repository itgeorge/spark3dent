<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spark3Dent IAM</title>
  <link rel="icon" href="/images/logo.png" />
  <link rel="stylesheet" href="/css/app-chrome.css" />
  <style>
    :root{--a2:#7c3aed;--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--shadow:0 8px 30px rgba(15,23,42,.08);--radius:16px;--ok:#10b981;--bad:#ef4444;--lab-bg:#f5f3ff;--lab-border:#c4b5fd}
    *{box-sizing:border-box}body{margin:0;font-family:ui-sans-serif,system-ui,sans-serif;color:var(--text);background:var(--bg)}header{border-bottom:1px solid var(--border);background:rgba(248,250,252,.88);backdrop-filter:blur(10px);position:sticky;top:0;z-index:2}.wrap{max-width:1200px;margin:0 auto;padding:24px}.grid{display:grid;grid-template-columns:320px 1fr;gap:18px}.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}.body{padding:18px}.sub{font-size:12px;color:var(--muted)}.list{display:flex;flex-direction:column;gap:10px}.org-btn{width:100%;text-align:left;border:1px solid var(--border);border-radius:12px;background:white;padding:12px;cursor:pointer}.org-btn.lab{background:var(--lab-bg);border-color:var(--lab-border)}.org-btn.active{border-color:var(--a2);box-shadow:0 0 0 4px rgba(124,58,237,.12)}.org-btn .meta{display:block;font-size:12px;color:var(--muted);margin-top:4px}.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.kv div{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff}.label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:4px}.chip{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:700}.chip.active{background:#dcfce7;color:#166534}.chip.inactive{background:#fee2e2;color:#991b1b}.swatch{display:inline-flex;align-items:center;gap:8px}.swatch i{display:inline-block;width:18px;height:18px;border-radius:999px;border:1px solid var(--border)}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left;font-size:13px}th{font-size:11px;text-transform:uppercase;color:var(--muted)}.hidden{display:none!important}.auth-shell{min-height:100vh;display:grid;place-items:center;padding:24px}.auth-card{width:min(100%,520px);background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.auth-card-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}.auth-card-head img{width:38px;height:38px;border-radius:10px;object-fit:contain}.auth-card-body{padding:20px}.auth-card-body label{display:block;margin:12px 0 6px;font-size:12px;font-weight:800;color:var(--muted)}.auth-card-body input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;font:inherit}.btn{border:1px solid var(--border);border-radius:12px;background:white;padding:10px 13px;font-weight:750;cursor:pointer}.btn.primary{background:linear-gradient(180deg,#7c3aed,#6d28d9);color:white;border-color:#7c3aed}.msg{margin-top:12px;padding:10px 12px;border-radius:12px;font-size:13px}.msg.err{background:#fff1f2;border:1px solid #fecaca;color:#991b1b}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.empty{color:var(--muted)}@media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><div id="appChromeMount"></div></header>
<main class="wrap hidden" id="appRoot">
  <div class="grid">
    <section class="card">
      <div class="head"><div><b>Organizations</b><div class="sub">Read-only</div></div></div>
      <div class="body">
        <div class="toolbar" style="margin-bottom:12px">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)"><input id="includeInactive" type="checkbox"> Show inactive</label>
          <button class="btn" id="reloadBtn" type="button">Refresh</button>
        </div>
        <div id="orgList" class="list"></div>
        <div id="orgListEmpty" class="empty hidden">No organizations found.</div>
      </div>
    </section>
    <section class="card">
      <div class="head"><div><b id="orgTitle">Organization details</b><div class="sub" id="orgSub"></div></div></div>
      <div class="body">
        <div id="orgKv" class="kv"></div>
        <h3 id="orgMembersTitle" style="margin:18px 0 10px">Members</h3>
        <table><thead><tr><th>Member</th><th>Status</th><th>PIN fingerprint</th></tr></thead><tbody id="orgMembers"></tbody></table>
      </div>
    </section>
  </div>
</main>
<section id="login" class="auth-shell">
  <div class="auth-card">
    <div class="auth-card-head"><img src="/images/logo.png" alt="" aria-hidden="true"><div><h1 style="margin:0;font-size:18px;">Spark3Dent IAM</h1></div></div>
    <div class="auth-card-body">
      <label for="organizationCode">Organization code</label>
      <input id="organizationCode" value="LAB" autocomplete="username">
      <label for="pin">Password</label>
      <input id="pin" type="password" value="654321" autocomplete="current-password">
      <button class="btn primary" id="loginBtn" type="button" style="width:100%;margin-top:16px;">Enter</button>
      <div id="loginMsg" class="msg err hidden"></div>
    </div>
  </div>
</section>
<script src="/js/app-chrome.js"></script>
<script>
const $=id=>document.getElementById(id), api=(u,o={})=>fetch(u,{headers:{'content-type':'application/json',...(o.headers||{})},...o});
let actor=null, selectedCode=null, orgs=[];
const appChrome=AppChrome.mount(document.getElementById('appChromeMount'),{product:'iam',logoSrc:'images/logo.png',brandClick:()=>loadAll(),menuButtonClass:'btn'});
appChrome.onLogout(async()=>{await api('/api/scheduling/auth/logout',{method:'POST',body:'{}'});actor=null;showLogin()});
function esc(v){return String(v??'').replace(/[&<>\"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]))}
function statusChip(active){return `<span class="chip ${active?'active':'inactive'}">${active?'Active':'Inactive'}</span>`}
function orgTypeLabel(type){return type==='lab'?'Lab':'Clinic'}
function orgTitleLabel(type){return type==='lab'?'Lab profile':'Clinic organization'}
function orgMembersTitleLabel(type){return type==='lab'?'Lab members':'Clinic members'}
function rowHtml(member){return `<tr><td><b>${esc(member.label)}</b><div class="sub mono">${esc(member.id)}</div></td><td>${statusChip(!!member.isActive)}</td><td class="mono">${esc(member.pinFingerprint||'')}</td></tr>`}
function setKv(root,items){root.innerHTML=items.map(i=>`<div><span class="label">${esc(i.label)}</span><span>${i.html||esc(i.value||'—')}</span></div>`).join('')}
function showLogin(msg=''){document.body.classList.add('auth-locked');$('login').classList.remove('hidden');$('appRoot').classList.add('hidden');appChrome.sync(null);$('loginMsg').textContent=msg;$('loginMsg').classList.toggle('hidden',!msg);$('loginBtn').disabled=false;$('loginBtn').textContent='Enter'}
async function requireLab(){const r=await api('/api/scheduling/auth/me');const j=await r.json().catch(()=>({}));if(!r.ok)return showLogin();if(!j.isLab){window.location.replace('/orders');return false}actor=j;appChrome.sync(actor);$('login').classList.add('hidden');$('appRoot').classList.remove('hidden');return true}
function renderOrgList(){const root=$('orgList');root.innerHTML='';$('orgListEmpty').classList.toggle('hidden',orgs.length>0);for(const org of orgs){const b=document.createElement('button');b.type='button';b.className=`org-btn${org.organizationType==='lab'?' lab':''}${org.code===selectedCode?' active':''}`;b.innerHTML=`<b>${esc(org.displayName)}</b><span class="meta">${esc(orgTypeLabel(org.organizationType||'clinic'))}</span><span class="meta mono">${esc(org.code)}</span><span class="meta">${org.activeMemberCount}/${org.memberCount} active members</span>`;b.onclick=()=>loadOrganization(org.code);root.appendChild(b)}}
async function loadOrganizations(){const include=$('includeInactive').checked;const r=await api(`/api/iam/organizations?includeInactive=${include?'true':'false'}`);const j=await r.json();if(!r.ok)throw new Error(j.error||'Could not load organizations.');orgs=(j.items||[]).slice().sort((a,b)=>{const aLab=a.organizationType==='lab'?0:1,bLab=b.organizationType==='lab'?0:1;return aLab-bLab||String(a.displayName||a.code).localeCompare(String(b.displayName||b.code))});if(!selectedCode||!orgs.some(x=>x.code===selectedCode))selectedCode=orgs[0]?.code||null;renderOrgList();if(selectedCode)await loadOrganization(selectedCode);else{$('orgTitle').textContent='Organization details';$('orgSub').textContent='';$('orgKv').innerHTML='';$('orgMembersTitle').textContent='Members';$('orgMembers').innerHTML='<tr><td colspan="3" class="empty">No organization selected.</td></tr>'}}
async function loadOrganization(code){selectedCode=code;renderOrgList();const r=await api(`/api/iam/organizations/${encodeURIComponent(code)}`);const j=await r.json();if(!r.ok)throw new Error(j.error||'Could not load organization.');const type=j.organizationType||'clinic';$('orgTitle').textContent=orgTitleLabel(type);$('orgSub').textContent=`${j.displayName||j.code} (${orgTypeLabel(type)})`;$('orgMembersTitle').textContent=orgMembersTitleLabel(type);const items=[{label:'Type',value:orgTypeLabel(type)},{label:'Code',value:j.code},{label:'Display name',value:j.displayName},{label:'Status',html:statusChip(!!j.isActive)}];if(type==='clinic'){items.push({label:'Linked client',value:j.linkedClientNickname||'—'},{label:'Display color',html:j.displayColor?`<span class="swatch"><i style="background:${esc(j.displayColor)}"></i><span class="mono">${esc(j.displayColor)}</span></span>`:'—'})}items.push({label:'Updated',value:j.updatedAt});setKv($('orgKv'),items);$('orgMembers').innerHTML=(j.members||[]).map(rowHtml).join('')||'<tr><td colspan="3" class="empty">No members.</td></tr>'}
async function loadAll(){try{if(!await requireLab())return;await loadOrganizations()}catch(err){showLogin(err?.message||'Could not load IAM.')}}
$('loginBtn').onclick=async()=>{if($('loginBtn').disabled)return;$('loginBtn').disabled=true;$('loginBtn').textContent='Signing in…';$('loginMsg').classList.add('hidden');try{const r=await api('/api/scheduling/auth/login',{method:'POST',body:JSON.stringify({organizationCode:$('organizationCode').value,pin:$('pin').value})});const j=await r.json().catch(()=>({error:'Login failed.'}));if(!r.ok)return showLogin(j.error||'Login failed.');if(!j.isLab){window.location.replace('/orders');return}actor=j;await loadAll()}catch{showLogin('Login failed.')}};
['organizationCode','pin'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')$('loginBtn').click()}));
$('reloadBtn').onclick=()=>loadAll();
$('includeInactive').addEventListener('change',()=>loadOrganizations());
loadAll();
</script>
</body>
</html>
