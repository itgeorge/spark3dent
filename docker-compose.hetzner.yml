services:
  web:
    image: ${SPARK3DENT_IMAGE:-spark3dent-web:latest}
    container_name: spark3dent-web
    # For legacy PDF import, add App__OpenAiKey via .env or environment (never commit real keys)
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Runtime__HostingMode: HetznerDocker
      Runtime__Port: ${SPARK3DENT_PORT:-8080}
      Runtime__BindAddress: 0.0.0.0
      SingleBox__DatabasePath: /var/opt/spark3dent/data/spark3dent.db
      SingleBox__BlobStoragePath: /var/opt/spark3dent/blobs
      SingleBox__LogDirectory: /var/log/spark3dent
    expose:
      - "${SPARK3DENT_PORT:-8080}"
    volumes:
      - ${SPARK3DENT_DATA_DIR:-./data}:/var/opt/spark3dent/data
      - ${SPARK3DENT_BLOB_DIR:-./blobs}:/var/opt/spark3dent/blobs
      - ${SPARK3DENT_LOG_DIR:-./logs}:/var/log/spark3dent
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: spark3dent-oauth2-proxy
    env_file:
      - ${SPARK3DENT_OAUTH2_ENV_FILE:-./oauth2-proxy/.env}
    volumes:
      - ${SPARK3DENT_OAUTH2_CONFIG_DIR:-./oauth2-proxy/config}:/config:ro
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAMS: static://200
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: ${OAUTH2_PROXY_ALLOWED_EMAILS_FILE:-/config/allowed_emails.txt}
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: spark3dent-caddy
    depends_on:
      - web
      - oauth2-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
